<form action="/registration" method="POST">
    <!--Action - url or path form should submit request to 
     <form -http method - get and post methods -->

    <!--Text input-->
    <label for="username">UserName</label>
    <input type="text" name="username" />

    <!--Password input-->
    <label for="password">Password</label>
    <input type="password" name="password" />

    <input type="submit" />

    <!--Checkbox-->
    <label for="dog">I own a dog</label>
    <input type="checkbox" name="dog" value="dog" />

    <label for="cat">I own a cat</label>
    <input type="checkbox" name="cat" value="cat" />

    <!--Radio -->
    <label for="cat">I am right handed </label>
    <input type="radio" name="right" value="right" />

    <!--Other-->
    <input type="number" name="age">
    <input type="email" name="email">
    <input type="file" name="file">

    <!--Forms that use other inputs-->
    <textarea name="multilinetext" rows="5"></textarea>
    <select name="food"></select>

</form>
